<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인</title>
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body>
  <div class="login-page">
    <header class="page-header">
      <h1 class="page-header__title">아무 말 대잔치</h1>
    </header>

    <main class="login-section">
      <h2 class="login-section__title">로그인</h2>

      <form id="loginForm" class="login-form" novalidate>
  <div class="form-group">
    <label for="email" class="form-label">이메일</label>
    <input
      type="email"
      id="email"
      class="form-input"
      placeholder="이메일을 입력하세요"
      autocomplete="email"
    />
  </div>

  <div class="form-group">
    <label for="password" class="form-label">비밀번호</label>
    <input
      type="password"
      id="password"
      class="form-input"
      placeholder="비밀번호를 입력하세요"
      autocomplete="current-password"
    />
  </div>

  <p id="loginHelper" class="helper-text" aria-live="polite"></p>

  <button id="loginButton" type="submit" class="login-button" disabled>
    로그인
  </button>
</form>

<a href="./signup.html" class="signup-link">회원가입</a>


    </main>
  </div>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
<script src="../js/login.js"></script>
</body>
</html>
