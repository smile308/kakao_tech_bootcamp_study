<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대나무숲 로그인</title>
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body>
  <div class="login-page">
    <header class="page-header">
      <h1 class="page-header__title">대나무숲</h1>
    </header>

    <main class="login-section">
      <section class="auth-copy-panel" aria-label="서비스 소개">
        <p>Anonymous Bamboo Board</p>
        <h2>익명으로 가볍게 털어놓는 우리만의 대나무숲</h2>
        <dl>
          <div><dt>익명 게시판</dt><dd>누구인지 드러내지 않고 편하게 작성</dd></div>
          <div><dt>가벼운 분위기</dt><dd>농담도 고민도 짧게 한마디</dd></div>
        </dl>
      </section>

      <section class="auth-form-panel">
      <h2 class="login-section__title">로그인</h2>

      <form id="loginForm" class="login-form" novalidate>
  <div class="form-group">
    <label for="email" class="form-label">이메일</label>
    <input
      type="email"
      id="email"
      class="form-input"
      placeholder="이메일을 입력하세요"
      autocomplete="email"
    />
  </div>

  <div class="form-group">
    <label for="password" class="form-label">비밀번호</label>
    <input
      type="password"
      id="password"
      class="form-input"
      placeholder="비밀번호를 입력하세요"
      autocomplete="current-password"
    />
  </div>

  <p id="loginHelper" class="helper-text" aria-live="polite"></p>

  <button id="loginButton" type="submit" class="login-button" disabled>
    로그인
  </button>
</form>

<a href="./signup.html" id="signupLink" class="signup-link">회원가입</a>

      </section>

    </main>
  </div>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
<script src="../js/login.js"></script>
</body>
</html>
