<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게시글 작성</title>
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/posts.css" />
</head>
<body>
  <div class="post-create-page">
    <header class="page-header">
      <button type="button" id="backButton" class="detail-back-button" aria-label="뒤로가기">
        <span class="detail-back-button__icon"></span>
      </button>

      <h1 class="page-header__title">아무 말 대잔치</h1>

      <div class="header-profile">
  <button
    type="button"
    id="profileMenuButton"
    class="header-profile__button is-empty"
    aria-label="사용자 메뉴 열기"
  >
    <img
      src=""
      alt="프로필 이미지"
      class="header-profile__image"
    />
  </button>

  <nav id="profileMenu" class="profile-menu" aria-label="사용자 메뉴">
    <a href="./profile-edit.html" class="profile-menu__item">
      회원정보수정
    </a>

    <a href="./password-edit.html" class="profile-menu__item">
      비밀번호수정
    </a>

    <button
      type="button"
      id="logoutButton"
      class="profile-menu__item profile-menu__logout"
    >
      로그아웃
    </button>
  </nav>
</div>
    </header>

    <main class="post-create-main">
      <h2 class="post-create-title">게시글 작성</h2>

      <form id="postCreateForm" class="post-create-form" novalidate>
        <label for="postTitleInput" class="post-create-label post-create-label--title">
          제목*
        </label>

        <input
          type="text"
          id="postTitleInput"
          class="post-create-title-input"
          placeholder="제목을 입력해주세요. (최대 26글자)"
          maxlength="26"
        />

        <label for="postContentInput" class="post-create-label post-create-label--content">
          내용*
        </label>

        <textarea
          id="postContentInput"
          class="post-create-content-input"
          placeholder="내용을 입력해주세요."
        ></textarea>

        <p id="postCreateHelper" class="post-create-helper">*제목,내용을 모두 작성해주세요</p>

        <label class="post-create-label post-create-label--image">
          이미지
        </label>

        <div class="post-create-file-area">
          <label for="postImageInput" class="post-create-file-button">
            파일 선택
          </label>

          <span id="selectedFileName" class="post-create-file-name">
            파일을 선택해주세요.
          </span>

          <input
            type="file"
            id="postImageInput"
            class="post-create-file-input"
            accept="image/*"
          />
        </div>

        <button id="postCreateSubmitButton" type="submit" class="post-create-submit-button">
          완료
        </button>
      </form>
    </main>
  </div>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/header-menu.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/post-create.js"></script>
</body>
</html>
