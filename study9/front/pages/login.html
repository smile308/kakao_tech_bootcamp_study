<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대나무숲 로그인</title>
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body>
  <div class="login-page">
    <header class="page-header">
      <h1 class="page-header__title">대나무숲</h1>
    </header>

    <main class="login-section">
      <section class="auth-copy-panel" aria-label="서비스 소개">
        <p>Open After Dark</p>
        <h2>다들 잠든 시간, 여기선 마음을 꺼내도 괜찮아요</h2>
        <dl>
          <div><dt>이름 없는 걸음</dt><dd>누구인지 몰라도 편하게 남기는 하루</dd></div>
          <div><dt>반딧불 댓글</dt><dd>서로의 이야기에 살짝 불을 비춰주는 공감</dd></div>
        </dl>
      </section>

      <section class="auth-form-panel">
      <h2 class="login-section__title">로그인</h2>

      <form id="loginForm" class="login-form" novalidate>
  <div class="form-group">
    <label for="email" class="form-label">이메일</label>
    <input
      type="email"
      id="email"
      class="form-input"
      placeholder="이메일을 입력하세요"
      autocomplete="email"
    />
    <p id="emailHelper" class="helper-text" aria-live="polite"></p>
  </div>

  <div class="form-group">
    <label for="password" class="form-label">비밀번호</label>
    <input
      type="password"
      id="password"
      class="form-input"
      placeholder="비밀번호를 입력하세요"
      autocomplete="current-password"
    />
    <p id="passwordHelper" class="helper-text" aria-live="polite"></p>
  </div>

  <button id="loginButton" type="submit" class="login-button" disabled>
    로그인
  </button>
</form>

<a href="./signup.html" id="signupLink" class="signup-link">회원가입</a>

      </section>

    </main>
  </div>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
<script src="../js/login.js"></script>
</body>
</html>
