<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대나무숲 비밀번호 수정</title>
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/user.css" />
</head>
<body>
  <div class="password-edit-page">
    <header class="page-header">
      

  <a
    href="./posts.html"
    class="detail-back-button"
    aria-label="뒤로가기"
  >
    <span class="detail-back-button__icon"></span>
  </a>

      <h1 class="page-header__title">계정 보안</h1>

      <div class="header-profile">
        <button
          type="button"
          id="profileMenuButton"
          class="header-profile__button is-empty"
          aria-label="사용자 메뉴 열기"
        >
          <img
            src=""
            alt="프로필 이미지"
            class="header-profile__image"
          />
        </button>

        <nav id="profileMenu" class="profile-menu" aria-label="사용자 메뉴">
          <a href="./profile-edit.html" class="profile-menu__item">
            회원정보 수정
          </a>

          <a href="./password-edit.html" class="profile-menu__item">
            비밀번호 수정
          </a>

          <button
            type="button"
            id="logoutButton"
            class="profile-menu__item profile-menu__logout"
          >
            로그아웃
          </button>
        </nav>
      </div>
    </header>

    <main class="password-edit-section">
      <h2 class="password-edit-title">비밀번호 수정</h2>

      <aside class="account-side-panel" aria-label="보안 안내">
        <p>Security</p>
        <strong>대나무숲 계정을 안전하게 보호하세요</strong>
        <span>글과 댓글을 편안하게 관리할 수 있도록 비밀번호를 새롭게 설정하세요.</span>
      </aside>

      <form id="passwordEditForm" class="password-edit-form" novalidate>
        <div class="password-form-group password-form-group--current">
          <label for="currentPasswordInput" class="password-label">현재 비밀번호</label>

          <input
            type="password"
            id="currentPasswordInput"
            class="password-input"
            placeholder="현재 비밀번호를 입력하세요"
            autocomplete="current-password"
          />

          <p id="currentPasswordHelper" class="password-helper-text"></p>
        </div>

        <div class="password-form-group password-form-group--password">
          <label for="passwordInput" class="password-label">새 비밀번호</label>

          <input
            type="password"
            id="passwordInput"
            class="password-input"
            placeholder="새 비밀번호를 입력하세요"
            autocomplete="new-password"
          />

          <p id="passwordHelper" class="password-helper-text"></p>
        </div>

        <div class="password-form-group password-form-group--confirm">
          <label for="passwordConfirmInput" class="password-label">새 비밀번호 확인</label>

          <input
            type="password"
            id="passwordConfirmInput"
            class="password-input"
            placeholder="새 비밀번호를 한번 더 입력하세요"
            autocomplete="new-password"
          />

          <p id="passwordConfirmHelper" class="password-helper-text"></p>
        </div>

        <button
          type="submit"
          id="passwordEditButton"
          class="password-edit-button"
          disabled
        >
          수정하기
        </button>
      </form>

      <div id="toastMessage" class="toast-message is-hidden">
        수정 완료
      </div>
    </main>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/header-menu.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/password-edit.js"></script>
</body>
</html>
