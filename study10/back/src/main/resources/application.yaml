spring:
  application:
    name: springdatajpa

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
    show-sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

jwt:
  secret: ${JWT_SECRET:default-development-jwt-secret-key-must-be-at-least-32-chars-change-me}
  access-expiration-millis: ${JWT_ACCESS_EXPIRATION_MILLIS:600000}
  refresh-expiration-millis: ${JWT_REFRESH_EXPIRATION_MILLIS:10800000}
  refresh-session-cleanup-interval-millis: ${JWT_REFRESH_SESSION_CLEANUP_INTERVAL_MILLIS:3600000}
  # HTTPS 운영 배포 환경에서는 JWT_REFRESH_COOKIE_SECURE=true로 설정해야 한다.
  refresh-cookie-secure: ${JWT_REFRESH_COOKIE_SECURE:false}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5500,http://127.0.0.1:5500,http://localhost:5173,http://127.0.0.1:5173}
