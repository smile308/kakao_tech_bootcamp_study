name: bamboo-board

services:
  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    image: bamboo-board-backend:latest
    env_file:
      - path: .env
        required: false
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      JWT_REFRESH_COOKIE_PATH: /api/sessions
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8081}
    expose:
      - "8080"
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    build:
      context: ./react
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    image: bamboo-board-frontend:latest
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8081}:80"
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
