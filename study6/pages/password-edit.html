<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>비밀번호 수정</title>
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/user.css" />
</head>
<body>
  <div class="password-edit-page">
    <header class="page-header">
      <h1 class="page-header__title">아무 말 대잔치</h1>

      <div class="header-profile">
        <button type="button" class="header-profile__button is-empty" aria-label="사용자 메뉴 열기">
          <img alt="프로필 이미지" class="header-profile__image" />
        </button>

        <nav class="profile-menu" aria-label="사용자 메뉴">
          <a href="./profile-edit.html" class="profile-menu__item">회원정보수정</a>
          <a href="./password-edit.html" class="profile-menu__item">비밀번호수정</a>
          <button type="button" class="profile-menu__item profile-menu__logout">
            로그아웃
          </button>
        </nav>
      </div>
    </header>

    <main class="password-edit-section">
      <h2 class="password-edit-title">비밀번호 수정</h2>

      <form id="passwordEditForm" class="password-edit-form" novalidate>
        <div class="password-form-group">
          <label for="password" class="password-form-label">비밀번호</label>
          <input
            type="password"
            id="password"
            class="password-form-input"
            placeholder="비밀번호를 입력하세요"
            autocomplete="new-password"
          />
          <p id="passwordHelper" class="password-helper-text"></p>
        </div>

        <div class="password-form-group password-confirm-group">
          <label for="passwordConfirm" class="password-form-label">비밀번호 확인</label>
          <input
            type="password"
            id="passwordConfirm"
            class="password-form-input"
            placeholder="비밀번호를 한번 더 입력하세요"
            autocomplete="new-password"
          />
          <p id="passwordConfirmHelper" class="password-helper-text"></p>
        </div>

        <button id="passwordSubmitButton" type="submit" class="password-submit-button" disabled>
          수정하기
        </button>
      </form>
    </main>
  </div>

  <script src="../js/password-edit.js"></script>
</body>
</html>
